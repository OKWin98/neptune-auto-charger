name: Neptune Auto Charge

on:
  # 1. 接收外部网络钩子（由 cron-job.org 准时触发）
  repository_dispatch:
    types: [auto_charge]
  
  # 2. 支持在 GitHub 网页上手动点击运行（方便测试）
  workflow_dispatch:

jobs:
  auto-charge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "NEPTUNE_OPEN_ID=${{ secrets.NEPTUNE_OPEN_ID }}" >> .env
          echo "NEPTUNE_AREA_ID=${{ secrets.NEPTUNE_AREA_ID }}" >> .env
          echo "NEPTUNE_EMPLOYEE_ID=${{ secrets.NEPTUNE_EMPLOYEE_ID }}" >> .env

      - name: Run auto charge script
        run: |
          python main.py
